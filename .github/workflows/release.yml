name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3). If empty, taken from tag vX.Y.Z'
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            echo "Unable to determine release version. Provide workflow input 'version'." >&2
            exit 1
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Resolved version is empty" >&2
            exit 1
          fi

          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit and integration tests
        run: ./gradlew --no-daemon clean test -PreleaseVersion=${{ steps.version.outputs.value }}

      - name: Build artifacts
        run: ./gradlew --no-daemon build -x test -PreleaseVersion=${{ steps.version.outputs.value }}

      - name: Publish to GitHub Packages
        run: ./gradlew --no-daemon publish -PreleaseVersion=${{ steps.version.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-reports
          path: |
            build/reports/tests
            build/test-results

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            build/libs/*.jar
